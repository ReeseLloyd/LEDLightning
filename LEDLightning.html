<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEDLightning v1.4</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:       #05060f;
  --panel-bg: #080911;
  --text:     #aabbcc;
  --accent:   #5bc8ff;
  --border:   #1a2535;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 0.75rem 1.25rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

header h1 {
  font-size: 1.2rem;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #445566;
}

header h1 span {
  color: var(--accent);
  text-shadow: 0 0 8px var(--accent), 0 0 20px rgba(91,200,255,0.4);
}

.container {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  min-width: 240px;
  padding: 1rem;
  background: var(--panel-bg);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.group-label {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #445;
}

.control-group input[type=number],
.control-group select {
  background: #050608;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.45rem 0.5rem;
  border-radius: 4px;
  font-size: 0.85rem;
  width: 100%;
}

.control-group input:focus,
.control-group select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 4px rgba(91,200,255,0.25);
}

.control-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.control-row input[type=range] {
  flex: 1;
  accent-color: var(--accent);
  cursor: pointer;
  padding: 0;
}

.val {
  font-size: 0.8rem;
  color: var(--accent);
  min-width: 1.2rem;
  text-align: right;
  text-shadow: 0 0 5px rgba(91,200,255,0.5);
}

button {
  background: #0a1520;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 0.6rem 0.75rem;
  border-radius: 4px;
  font-size: 0.85rem;
  cursor: pointer;
  width: 100%;
  text-shadow: 0 0 5px rgba(91,200,255,0.4);
  box-shadow: 0 0 5px rgba(91,200,255,0.1);
  transition: background 0.15s, box-shadow 0.15s;
}

button:hover {
  background: #0f2030;
  box-shadow: 0 0 10px rgba(91,200,255,0.25);
}

.divider {
  height: 1px;
  background: var(--border);
}

.version {
  margin-top: auto;
  font-size: 0.65rem;
  color: #223;
  padding-top: 0.5rem;
}

.view-pane {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

canvas {
  display: block;
  image-rendering: pixelated;
  transform-origin: center center;
}
</style>
</head>
<body>

<header>
  <h1>LED<span>Lightning</span></h1>
</header>

<div class="container">
  <aside class="sidebar">

    <div class="control-group">
      <span class="group-label">Seed</span>
      <input type="number" id="seedIn" min="1" max="2147483647">
      <button id="randBtn">Random</button>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <span class="group-label">Frequency</span>
      <div class="control-row">
        <input type="range" id="freqIn" min="1" max="10" value="5">
        <span class="val" id="freqVal">5</span>
      </div>
    </div>

    <div class="control-group">
      <span class="group-label">Branching</span>
      <div class="control-row">
        <input type="range" id="branchIn" min="1" max="10" value="5">
        <span class="val" id="branchVal">5</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <span class="group-label">Palette</span>
      <select id="palIn">
        <option value="0">Electric Blue</option>
        <option value="1">Purple Plasma</option>
        <option value="2">Warm Lightning</option>
        <option value="3">Aurora Discharge</option>
        <option value="4">Red Storm</option>
        <option value="5">Mixed</option>
      </select>
    </div>

    <div class="version">v1.4</div>

  </aside>

  <div class="view-pane" id="viewPane">
    <canvas id="c"></canvas>
  </div>
</div>

<script>
const W = 100, H = 100, CELL = 6;
const canvas = document.getElementById('c');
canvas.width  = W * CELL;
canvas.height = H * CELL;
const ctx = canvas.getContext('2d');
const img = ctx.createImageData(W * CELL, H * CELL);
const buf = img.data;

// --- LED kernel ---
const kern = new Float32Array(CELL * CELL);
const hc = CELL * 0.5;
for (let py = 0; py < CELL; py++)
  for (let px = 0; px < CELL; px++) {
    const dx = px - hc + 0.5, dy = py - hc + 0.5;
    const d = Math.sqrt(dx * dx + dy * dy) / (hc * 0.88);
    kern[py * CELL + px] = Math.max(0, 1 - d * d);
  }

// --- Grid buffer ---
const gridR = new Float32Array(W * H);
const gridG = new Float32Array(W * H);
const gridB = new Float32Array(W * H);

// --- Seeded PRNG (mulberry32) ---
function makeRng(seed) {
  let s = seed | 0;
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// --- Simple 1D value noise ---
function valueNoise(rng, n) {
  const vals = [];
  for (let i = 0; i < n; i++) vals.push(rng());
  return function(x) {
    const idx = ((x % n) + n) % n;
    const i0  = Math.floor(idx), i1 = (i0 + 1) % n;
    const frac = idx - i0;
    const smooth = frac * frac * (3 - 2 * frac);
    return vals[i0] * (1 - smooth) + vals[i1] * smooth;
  };
}

// ── Silhouette generators ──────────────────────────────────────────────────
// Each takes an rng and returns { rows: string[], baseColor: [r,g,b] }.
// Rows run top→bottom; 'X' = lit pixel, '.' = empty. All rows in a shape
// must be the same length. Max size is roughly 8×8 cells.

function genPine(rng) {
  const numLayers = 2 + Math.floor(rng() * 3);   // 2–4 canopy tiers
  const trunkH    = 2 + Math.floor(rng() * 3);   // 2–4 trunk rows
  const trunkW    = 1 + Math.floor(rng() * 2);   // 1 or 2 wide
  const gridW     = 2 * numLayers + 1;            // 5, 7, or 9

  const cx   = Math.floor(gridW / 2);
  const rows = [];

  for (let i = 0; i < numLayers; i++) {
    // Symmetric ±1 edge wobble keeps the tree balanced but not stamped
    const edgeMod = i > 0 ? Math.floor(rng() * 3) - 1 : 0;  // -1, 0, or +1
    const lEdge   = Math.max(0,          cx - i - edgeMod);
    const rEdge   = Math.min(gridW - 1,  cx + i + edgeMod);
    const row     = Array(gridW).fill('.');
    for (let c = lEdge; c <= rEdge; c++) row[c] = 'X';
    rows.push(row.join(''));
    // Occasionally repeat the widest tier for a chunkier canopy
    if (i === numLayers - 1 && rng() > 0.5) rows.push(row.join(''));
  }

  // Trunk — centred, 1 or 2 wide
  const tl    = cx - Math.floor(trunkW / 2);
  const trunk = Array(gridW).fill('.');
  for (let c = tl; c < tl + trunkW && c < gridW; c++) trunk[c] = 'X';
  for (let i = 0; i < trunkH; i++) rows.push(trunk.join(''));

  return { rows, baseColor: [35, 68, 42] };  // silver-green
}

function genRoundTree(rng) {
  const canopyR = 2 + Math.floor(rng() * 2);              // radius 2–3 → 5 or 7 wide
  const canopyH = canopyR + 1 + Math.floor(rng() * 2);    // slightly taller than wide
  const trunkH  = 2 + Math.floor(rng() * 3);              // 2–4 rows
  const trunkW  = 1 + Math.floor(rng() * 2);              // 1–2 wide
  const gridW   = 2 * canopyR + 1;
  const cx      = canopyR;
  const rows    = [];

  for (let row = 0; row < canopyH; row++) {
    const t   = (2 * row / (canopyH - 1)) - 1;  // −1..+1
    const hw  = Math.max(1, Math.round(canopyR * Math.sqrt(Math.max(0, 1 - t * t))));
    // Independent left/right edge noise for an organic, asymmetric crown
    const lMod   = Math.floor(rng() * 3) - 1;
    const rMod   = Math.floor(rng() * 3) - 1;
    const lEdge  = Math.max(0,          cx - hw + lMod);
    const rEdge  = Math.min(gridW - 1,  cx + hw + rMod);
    const r      = Array(gridW).fill('.');
    for (let c = lEdge; c <= rEdge; c++) r[c] = 'X';
    rows.push(r.join(''));
  }

  const tl    = cx - Math.floor(trunkW / 2);
  const trunk = Array(gridW).fill('.');
  for (let c = tl; c < tl + trunkW && c < gridW; c++) trunk[c] = 'X';
  for (let i = 0; i < trunkH; i++) rows.push(trunk.join(''));

  return { rows, baseColor: [10, 48, 16] };  // dark green
}

function genHouse(rng) {
  const bodyW      = 4 + Math.floor(rng() * 4);   // 4–7 wide
  const bodyH      = 2 + Math.floor(rng() * 3);   // 2–4 storeys
  const hasChimney = rng() > 0.4;
  const chimSide   = Math.floor(rng() * 2);        // 0=left, 1=right
  const chimTall   = rng() > 0.5 ? 2 : 1;         // 1 or 2 rows
  const cxL        = Math.floor((bodyW - 1) / 2);
  const cxR        = Math.ceil ((bodyW - 1) / 2);
  const rows       = [];

  // Optional chimney above the roof peak
  if (hasChimney) {
    const cr = Array(bodyW).fill('.');
    cr[chimSide === 0 ? 1 : bodyW - 2] = 'X';
    for (let i = 0; i < chimTall; i++) rows.push(cr.join(''));
  }

  // Peaked roof — expands 1 cell per row from centre outward
  const roofRows = Math.ceil(bodyW / 2);
  for (let i = 0; i < roofRows; i++) {
    const lEdge = Math.max(0,          cxL - i);
    const rEdge = Math.min(bodyW - 1,  cxR + i);
    const row   = Array(bodyW).fill('.');
    for (let c = lEdge; c <= rEdge; c++) row[c] = 'X';
    rows.push(row.join(''));
    if (lEdge === 0) break;
  }

  const bodyRow = Array(bodyW).fill('X').join('');
  for (let i = 0; i < bodyH; i++) rows.push(bodyRow);

  return { rows, baseColor: [58, 53, 14] };  // dim yellow
}

function genBarn(rng) {
  const bodyW     = 5 + Math.floor(rng() * 4);   // 5–8 wide
  const bodyH     = 2 + Math.floor(rng() * 3);   // 2–4 rows
  const isGambrel = rng() > 0.5;
  const cxL       = Math.floor((bodyW - 1) / 2);
  const cxR       = Math.ceil ((bodyW - 1) / 2);
  const rows      = [];

  if (isGambrel) {
    // Gambrel: wide peak (2–3 cells) that jumps quickly to near-full width
    const peakW = 2 + Math.floor(rng() * 2);
    for (const pw of [peakW, bodyW - 2, bodyW]) {
      const lEdge = Math.max(0,          cxL - Math.floor((pw - 1) / 2));
      const rEdge = Math.min(bodyW - 1,  cxR + Math.ceil ((pw - 1) / 2));
      const row   = Array(bodyW).fill('.');
      for (let c = lEdge; c <= rEdge; c++) row[c] = 'X';
      rows.push(row.join(''));
    }
  } else {
    // Simple peaked roof (same logic as house)
    const roofRows = Math.ceil(bodyW / 2);
    for (let i = 0; i < roofRows; i++) {
      const lEdge = Math.max(0,          cxL - i);
      const rEdge = Math.min(bodyW - 1,  cxR + i);
      const row   = Array(bodyW).fill('.');
      for (let c = lEdge; c <= rEdge; c++) row[c] = 'X';
      rows.push(row.join(''));
      if (lEdge === 0) break;
    }
  }

  const bodyRow = Array(bodyW).fill('X').join('');
  for (let i = 0; i < bodyH; i++) rows.push(bodyRow);

  return { rows, baseColor: [62, 16, 16] };  // dim red
}

function genRock(rng) {
  const maxW = 3 + Math.floor(rng() * 5);   // 3–7 wide
  const maxH = 2 + Math.floor(rng() * 3);   // 2–4 tall
  const cx   = (maxW - 1) / 2;
  const rows = [];

  for (let row = 0; row < maxH; row++) {
    const isTop = row === 0;
    const isBtm = row === maxH - 1;
    // Profile: narrow at top (~40 %), wide at bottom (~88 %) — like a resting boulder
    const hwF   = isTop ? 0.40 : isBtm ? 0.88 : 0.62 + rng() * 0.30;
    const hw    = (maxW / 2) * hwF;
    // Independent left/right edge noise for organic silhouette
    const lMod  = Math.floor(rng() * 3) - 1;
    const rMod  = Math.floor(rng() * 3) - 1;
    const lEdge = Math.max(0,          Math.round(cx - hw) + lMod);
    const rEdge = Math.min(maxW - 1,   Math.round(cx + hw) + rMod);
    const r     = Array(maxW).fill('.');
    for (let c = lEdge; c <= rEdge; c++) r[c] = 'X';
    rows.push(r.join(''));
  }

  return { rows, baseColor: [50, 52, 58] };  // dim grey
}

function genBush(rng) {
  const numClusters = 1 + Math.floor(rng() * 3);   // 1–3 bumps at top
  const baseW       = 3 + Math.floor(rng() * 4);   // 3–6 wide
  const baseH       = 2 + Math.floor(rng() * 2);   // 2–3 base rows
  const clusters    = [];

  for (let i = 0; i < numClusters; i++) {
    clusters.push({
      cx: Math.floor(rng() * baseW),
      cr: 1 + Math.floor(rng() * 2),  // cluster radius 1–2
    });
  }

  const rows   = [];
  const totalH = baseH + 2;  // 2 bump rows + base rows

  for (let row = 0; row < totalH; row++) {
    const rowArr = Array(baseW).fill('.');
    if (row < 2) {
      // Top rows: fill from cluster centres — row 0 is tighter (radius − 1)
      for (const { cx, cr } of clusters) {
        const hw = row === 0 ? Math.max(0, cr - 1) : cr;
        for (let c = cx - hw; c <= cx + hw; c++)
          if (c >= 0 && c < baseW) rowArr[c] = 'X';
      }
    } else {
      // Base rows: mostly full with a slight edge taper
      const lN = Math.floor(rng() * 2);   // 0–1
      const rN = Math.floor(rng() * 2);
      for (let c = lN; c < baseW - rN; c++) rowArr[c] = 'X';
    }
    rows.push(rowArr.join(''));
  }

  return { rows, baseColor: [20, 58, 17] };  // dim green
}

function genLampPost(rng) {
  const poleH     = 3 + Math.floor(rng() * 4);   // 3–6 pole rows
  const headStyle = Math.floor(rng() * 3);         // 0: T, 1: L-left, 2: L-right
  const hasBase   = rng() > 0.3;
  const rows      = [];

  // Head
  if      (headStyle === 0) { rows.push('XXX'); }
  else if (headStyle === 1) { rows.push('X..'); rows.push('XX.'); }
  else                      { rows.push('..X'); rows.push('.XX'); }

  // Pole
  for (let i = 0; i < poleH; i++) rows.push('.X.');

  // Base
  rows.push(hasBase ? 'XXX' : '.X.');

  return { rows, baseColor: [28, 33, 42] };  // dim dark grey
}

const SILHOUETTE_GENERATORS = [
  genPine, genRoundTree, genHouse, genBarn, genRock, genBush, genLampPost,
];

// ── Palettes ─────────────────────────────────────────────────────────────
// Index 5 is Mixed: each bolt independently picks from 0–4.
const PALETTES = [
  { name: 'Electric Blue',
    cloud: [50,55,75],   cloudHi: [80,90,120],
    core: [200,230,255], mid: [100,160,255], dim: [30,60,180],
    flash: [160,200,255] },
  { name: 'Purple Plasma',
    cloud: [55,40,70],   cloudHi: [90,60,120],
    core: [230,180,255], mid: [180,80,255],  dim: [80,20,160],
    flash: [200,150,255] },
  { name: 'Warm Lightning',
    cloud: [60,50,40],   cloudHi: [100,80,60],
    core: [255,240,200], mid: [255,180,80],  dim: [180,100,20],
    flash: [255,220,160] },
  { name: 'Aurora Discharge',
    cloud: [35,60,55],   cloudHi: [50,100,80],
    core: [180,255,220], mid: [60,220,140],  dim: [20,120,80],
    flash: [120,255,200] },
  { name: 'Red Storm',
    cloud: [65,40,40],   cloudHi: [110,55,50],
    core: [255,220,200], mid: [255,80,50],   dim: [160,30,20],
    flash: [255,160,130] },
  { name: 'Mixed',
    cloud: [45,48,60],   cloudHi: [65,70,88],
    core: null, mid: null, dim: null,
    flash: [150,170,200] },
];
const MIXED_IDX = 5;

// ── Scene state ───────────────────────────────────────────────────────────
let cloudNoise1, cloudNoise2, cloudBase;
const CLOUD_MIN = 4, CLOUD_MAX = 10;

let groundNoise1, groundNoise2, groundBase;
let groundTopStatic;
const GROUND_TOP = 88, GROUND_RANGE = 8;

let sceneObjects = [];
let bolts        = [];
let strikeMarks  = [];
const STRIKE_LIFE = 120;
let time = 0, boltRng, nextBoltTime = 0;

const MAX_SEED = 2147483647;

function getSeed() {
  const el = document.getElementById('seedIn');
  let v = parseInt(el.value) || 1;
  if (v > MAX_SEED) v = MAX_SEED;
  if (v < 1)        v = 1;
  el.value = v;
  return v;
}

// ── Generate scene ─────────────────────────────────────────────────────────
function generateScene() {
  const seed = getSeed();
  const rng  = makeRng(seed);

  cloudNoise1 = valueNoise(rng, 12);
  cloudNoise2 = valueNoise(rng, 20);
  cloudBase   = new Float32Array(W);
  for (let x = 0; x < W; x++) cloudBase[x] = 0.3 + rng() * 0.4;

  groundNoise1 = valueNoise(rng, 10);
  groundNoise2 = valueNoise(rng, 18);
  groundBase   = new Float32Array(W);
  for (let x = 0; x < W; x++) groundBase[x] = 0.4 + rng() * 0.3;

  // Static ground height per column
  groundTopStatic = new Float32Array(W);
  for (let x = 0; x < W; x++) {
    const n1 = groundNoise1((x / W) * 10);
    const n2 = groundNoise2((x / W) * 18) * 0.3;
    groundTopStatic[x] = GROUND_TOP + (n1 + n2) * GROUND_RANGE;
  }

  // Place procedurally generated silhouette objects
  const objRng = makeRng(seed + 4567);
  sceneObjects  = [];
  const numObj  = 3 + Math.floor(objRng() * 5);   // 3–7 objects
  const used    = [];

  for (let attempt = 0; sceneObjects.length < numObj && attempt < numObj * 8; attempt++) {
    const genFn    = SILHOUETTE_GENERATORS[Math.floor(objRng() * SILHOUETTE_GENERATORS.length)];
    const generated = genFn(objRng);  // calls generator, consuming its RNG
    const w         = generated.rows[0].length;
    const h         = generated.rows.length;
    const cx        = 8 + Math.floor(objRng() * (W - 16));
    const baseX     = cx - Math.floor(w / 2);
    const baseY     = Math.round(groundTopStatic[Math.min(W - 1, cx)]) - h;
    if (baseX < 1 || baseX + w > W - 1 || baseY < 2) continue;
    const lo = baseX - 2, hi = baseX + w + 2;
    if (used.some(r => lo < r.hi && hi > r.lo)) continue;
    used.push({ lo, hi });
    sceneObjects.push({ rows: generated.rows, baseColor: generated.baseColor, baseX, baseY });
  }

  strikeMarks  = [];
  boltRng      = makeRng(seed + 7777);
  bolts        = [];
  time         = 0;
  nextBoltTime = 30 + Math.floor(boltRng() * 60);
}

// ── Scene geometry ─────────────────────────────────────────────────────────
function groundTop(x) {
  return groundTopStatic[Math.min(W - 1, Math.max(0, Math.floor(x)))];
}

function cloudBottom(x, t) {
  const n1 = cloudNoise1((x / W) * 12 + t * 0.002);
  const n2 = cloudNoise2((x / W) * 20 - t * 0.003) * 0.4;
  return CLOUD_MIN + (n1 + n2) * (CLOUD_MAX - CLOUD_MIN);
}

// ── Spawn bolt ─────────────────────────────────────────────────────────────
function spawnBolt(rng, branchStr) {
  const palIdx  = parseInt(document.getElementById('palIn').value) || 0;
  const boltPal = palIdx === MIXED_IDX
    ? PALETTES[Math.floor(rng() * 5)]
    : PALETTES[palIdx];

  const sx           = Math.floor(10 + rng() * (W - 20));
  const sy           = Math.floor(cloudBottom(sx, time));
  const segments     = [];
  const branchChance = 0.03 + branchStr * 0.09;
  let hitGround = false, hitX = sx;

  function trace(x, y, angle, energy, depth) {
    if (energy < 0.05 || depth > 6) return;
    const maxSteps = depth === 0 ? 200
      : Math.floor((8 + rng() * 25) * energy * (0.8 + branchStr * 0.4));
    let cx = x, cy = y;
    for (let i = 0; i < maxSteps; i++) {
      const gnd = groundTop(cx);
      if (cy >= gnd) {
        if (depth === 0) { hitGround = true; hitX = cx; }
        break;
      }
      angle += (rng() - 0.5) * 1.2;
      angle  = angle * 0.7 + (Math.PI * 0.5) * 0.3;
      const nx = cx + Math.cos(angle);
      const ny = cy + Math.sin(angle);
      segments.push({ x0: cx, y0: cy, x1: nx, y1: ny, energy, depth });
      cx = nx; cy = ny;
      if (rng() < branchChance && depth < 5) {
        const ba = angle + (rng() > 0.5 ? 1 : -1) * (0.3 + rng() * 0.7);
        trace(cx, cy, ba, energy * (0.5 + rng() * 0.3), depth + 1);
      }
      energy *= depth === 0 ? 0.995 : 0.985;
    }
  }

  trace(sx, sy, Math.PI * 0.5 + (rng() - 0.5) * 0.6, 1.0, 0);
  return { segments, birth: time, life: 30 + Math.floor(rng() * 25),
           sx, sy, hitGround, hitX, pal: boltPal, width: rng() };
}

// ── Pixel helpers ──────────────────────────────────────────────────────────
function setPixel(x, y, r, g, b, a) {
  x = Math.floor(x); y = Math.floor(y);
  if (x < 0 || x >= W || y < 0 || y >= H) return;
  const idx = y * W + x;
  gridR[idx] = Math.min(255, gridR[idx] + r * a);
  gridG[idx] = Math.min(255, gridG[idx] + g * a);
  gridB[idx] = Math.min(255, gridB[idx] + b * a);
}

function drawSegment(x0, y0, x1, y1, r, g, b, a) {
  const dx = x1 - x0, dy = y1 - y0;
  const steps = Math.max(Math.abs(dx), Math.abs(dy), 1);
  const sx = dx / steps, sy = dy / steps;
  let cx = x0, cy = y0;
  for (let i = 0; i <= steps; i++) {
    setPixel(cx, cy, r, g, b, a);
    cx += sx; cy += sy;
  }
}

// Flash envelope for ground/silhouettes — fades over full bolt lifetime
function boltFlashPhase(age, life) {
  if (age < 3)  return 1.0;
  if (age < 6)  return 0.8;
  return Math.max(0, 0.5 * (1 - (age - 6) / Math.max(1, life - 6)));
}

// ── Render loop ────────────────────────────────────────────────────────────
function renderFrame() {
  const freq      = parseInt(document.getElementById('freqIn').value)   || 5;
  const branchStr = parseInt(document.getElementById('branchIn').value) / 5;
  const palIdx    = parseInt(document.getElementById('palIn').value)    || 0;
  const pal       = PALETTES[palIdx];

  gridR.fill(0); gridG.fill(0); gridB.fill(0);

  // ── Clouds ──
  for (let x = 0; x < W; x++) {
    const bottom = cloudBottom(x, time);
    for (let y = 0; y < Math.ceil(bottom); y++) {
      const t       = y / bottom;
      const density = (0.2 + 0.8 * t * t) * cloudBase[x];
      const shimmer = 0.85 + 0.15 * Math.sin(time * 0.04 + x * 0.3 + y * 0.5);
      const a       = density * shimmer;

      let flashBoost = 0, fR = pal.flash[0], fG = pal.flash[1], fB = pal.flash[2];
      for (const bolt of bolts) {
        const age        = time - bolt.birth;
        if (age > bolt.life) continue;
        const flashPhase = age < 3 ? 1 : age < 6 ? 0.6 : 0;
        const dist       = Math.abs(x - bolt.sx);
        if (dist < 20 && flashPhase > 0) {
          const boost = flashPhase * (1 - dist / 20);
          if (boost > flashBoost) {
            flashBoost = boost;
            fR = bolt.pal.flash[0]; fG = bolt.pal.flash[1]; fB = bolt.pal.flash[2];
          }
        }
      }

      setPixel(x, y,
        pal.cloud[0] + (pal.cloudHi[0] - pal.cloud[0]) * t + fR * flashBoost * 0.5,
        pal.cloud[1] + (pal.cloudHi[1] - pal.cloud[1]) * t + fG * flashBoost * 0.5,
        pal.cloud[2] + (pal.cloudHi[2] - pal.cloud[2]) * t + fB * flashBoost * 0.5,
        a);
    }
  }

  // ── Ground (static) ──
  for (let x = 0; x < W; x++) {
    const top   = groundTopStatic[x];
    for (let y = Math.floor(top); y < H; y++) {
      const depth = (y - top) / (H - top);
      const a     = (0.3 + 0.5 * (1 - depth)) * groundBase[x];
      let gr = 12 + 20 * (1 - depth);
      let gg = 50 + 80 * (1 - depth);
      let gb = 10 + 15 * (1 - depth);

      let flashBoost = 0, fR = 0, fG = 0, fB = 0;

      for (const bolt of bolts) {
        if (!bolt.hitGround) continue;
        const age   = time - bolt.birth;
        if (age > bolt.life) continue;
        const phase = boltFlashPhase(age, bolt.life);
        const dist  = Math.abs(x - bolt.hitX);
        if (dist < 15 && phase > 0) {
          const boost = phase * (1 - dist / 15) * (1 - depth);
          if (boost > flashBoost) {
            flashBoost = boost;
            fR = bolt.pal.flash[0]; fG = bolt.pal.flash[1]; fB = bolt.pal.flash[2];
          }
        }
      }

      for (const mark of strikeMarks) {
        const mAge      = time - mark.birth;
        if (mAge >= STRIKE_LIFE) continue;
        const intensity = Math.pow(1 - mAge / STRIKE_LIFE, 2) * 0.45;
        const dist      = Math.abs(x - mark.x);
        if (dist < 10 && intensity > 0) {
          const boost = intensity * (1 - dist / 10) * (1 - depth * 0.5);
          if (boost > flashBoost) {
            flashBoost = boost;
            fR = mark.pal.flash[0]; fG = mark.pal.flash[1]; fB = mark.pal.flash[2];
          }
        }
      }

      setPixel(x, y,
        gr + fR * flashBoost * 0.35,
        gg + fG * flashBoost * 0.35,
        gb + fB * flashBoost * 0.35,
        a);
    }
  }

  // ── Silhouette objects ──
  // Rendered after ground so they override it. Direct grid assignment (not additive).
  for (const obj of sceneObjects) {
    const { rows, baseColor, baseX, baseY } = obj;
    for (let row = 0; row < rows.length; row++) {
      const py     = baseY + row;
      if (py < 0 || py >= H) continue;
      const rowStr = rows[row];
      for (let col = 0; col < rowStr.length; col++) {
        if (rowStr[col] !== 'X') continue;
        const px = baseX + col;
        if (px < 0 || px >= W) continue;

        // Start from the object's own dim base colour
        let sr = baseColor[0], sg = baseColor[1], sb = baseColor[2];

        // Brighten during active bolts (scene-wide flash)
        for (const bolt of bolts) {
          const age   = time - bolt.birth;
          if (age > bolt.life) continue;
          const phase = boltFlashPhase(age, bolt.life);
          if (phase === 0) continue;
          const dist = Math.abs(px - bolt.sx);
          if (dist < 30) {
            const boost = phase * (1 - dist / 30) * 0.7;
            sr = Math.min(255, sr + bolt.pal.flash[0] * boost);
            sg = Math.min(255, sg + bolt.pal.flash[1] * boost);
            sb = Math.min(255, sb + bolt.pal.flash[2] * boost);
          }
        }

        // Afterglow from strike marks
        for (const mark of strikeMarks) {
          const mAge      = time - mark.birth;
          if (mAge >= STRIKE_LIFE) continue;
          const intensity = Math.pow(1 - mAge / STRIKE_LIFE, 2) * 0.3;
          const dist      = Math.abs(px - mark.x);
          if (dist < 15 && intensity > 0) {
            const boost = intensity * (1 - dist / 15);
            sr = Math.min(255, sr + mark.pal.flash[0] * boost * 0.5);
            sg = Math.min(255, sg + mark.pal.flash[1] * boost * 0.5);
            sb = Math.min(255, sb + mark.pal.flash[2] * boost * 0.5);
          }
        }

        const idx  = py * W + px;
        gridR[idx] = sr;
        gridG[idx] = sg;
        gridB[idx] = sb;
      }
    }
  }

  // ── Spawn bolt ──
  if (time >= nextBoltTime) {
    bolts.push(spawnBolt(boltRng, branchStr));
    const wait = 20 + Math.floor(boltRng() * (200 / freq));
    nextBoltTime = time + wait;
    if (boltRng() < 0.25) {
      nextBoltTime = time + 3 + Math.floor(boltRng() * 8);
    }
  }

  // ── Draw bolts ──
  for (let bi = bolts.length - 1; bi >= 0; bi--) {
    const bolt = bolts[bi];
    const age  = time - bolt.birth;
    if (age > bolt.life) {
      if (bolt.hitGround) strikeMarks.push({ x: bolt.hitX, pal: bolt.pal, birth: time });
      bolts.splice(bi, 1);
      continue;
    }

    let envelope;
    if      (age < 2) envelope = 1.0;
    else if (age < 5) envelope = 0.85;
    else if (age < 8) envelope = 0.5;
    else              envelope = 0.5 * (1 - (age - 8) / (bolt.life - 8));
    if (envelope <= 0) continue;

    envelope *= age < 8 ? 0.9 + 0.1 * Math.sin(age * 3.5) : 1;

    const bp = bolt.pal;
    for (const seg of bolt.segments) {
      const depthFade = seg.depth === 0 ? 1.0 : Math.max(0.15, 0.7 - seg.depth * 0.15);
      const e = seg.energy * depthFade;
      const a = envelope * e;
      if (a < 0.01) continue;

      const coreF = Math.max(0, e - 0.5) * 2;
      const midF  = Math.min(e, 0.5) * 2;
      const dimF  = (1 - midF) * (1 - coreF);
      const r = bp.core[0] * coreF + bp.mid[0] * midF * (1 - coreF) + bp.dim[0] * dimF;
      const g = bp.core[1] * coreF + bp.mid[1] * midF * (1 - coreF) + bp.dim[1] * dimF;
      const b = bp.core[2] * coreF + bp.mid[2] * midF * (1 - coreF) + bp.dim[2] * dimF;

      drawSegment(seg.x0, seg.y0, seg.x1, seg.y1, r, g, b, a);
      if (a > 0.15) {
        const maxGlow    = seg.depth === 0 ? bolt.width
                         : seg.depth === 1 ? bolt.width * 0.5 : 0;
        const glowRadius = Math.min(3, Math.floor(maxGlow * 4));
        for (let off = 1; off <= glowRadius; off++) {
          const ga = a * 0.3 * Math.pow(0.55, off - 1);
          drawSegment(seg.x0 - off, seg.y0, seg.x1 - off, seg.y1, r, g, b, ga);
          drawSegment(seg.x0 + off, seg.y0, seg.x1 + off, seg.y1, r, g, b, ga);
        }
      }
    }
  }

  // ── Render to canvas via LED kernel ──
  const stride = W * CELL * 4;
  buf.fill(0);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx = y * W + x;
      const r = gridR[idx], g = gridG[idx], b = gridB[idx];
      const ox = x * CELL, oy = y * CELL;
      for (let py = 0; py < CELL; py++) {
        for (let px = 0; px < CELL; px++) {
          const k    = kern[py * CELL + px];
          const bIdx = (oy + py) * stride + (ox + px) * 4;
          buf[bIdx]     = Math.min(255, r * k);
          buf[bIdx + 1] = Math.min(255, g * k);
          buf[bIdx + 2] = Math.min(255, b * k + (1 - k) * 4);
          buf[bIdx + 3] = 255;
        }
      }
    }
  }
  ctx.putImageData(img, 0, 0);

  if (strikeMarks.length > 0)
    strikeMarks = strikeMarks.filter(m => (time - m.birth) < STRIKE_LIFE);

  time++;
  requestAnimationFrame(renderFrame);
}

// ── Canvas scaling ─────────────────────────────────────────────────────────
const viewPane = document.getElementById('viewPane');
function fitCanvas() {
  const scale = Math.min(
    viewPane.clientWidth  / (W * CELL),
    viewPane.clientHeight / (H * CELL)
  );
  canvas.style.transform = `scale(${scale})`;
}
new ResizeObserver(fitCanvas).observe(viewPane);

// ── Controls ───────────────────────────────────────────────────────────────
function rebuild() { generateScene(); }

document.getElementById('seedIn').addEventListener('change', rebuild);
document.getElementById('palIn').addEventListener('change', rebuild);

document.getElementById('freqIn').addEventListener('input', e => {
  document.getElementById('freqVal').textContent = e.target.value;
});
document.getElementById('branchIn').addEventListener('input', e => {
  document.getElementById('branchVal').textContent = e.target.value;
});

document.getElementById('randBtn').addEventListener('click', () => {
  document.getElementById('seedIn').value = 1 + Math.floor(Math.random() * MAX_SEED);
  rebuild();
});

document.getElementById('seedIn').value = 1 + Math.floor(Math.random() * MAX_SEED);
generateScene();
renderFrame();
</script>
</body>
</html>
